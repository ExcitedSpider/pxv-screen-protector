# Copy to ~/.config/pixiv-slides/config.toml and fill in your refresh token.

refresh_token = "PASTE_YOUR_REFRESH_TOKEN_HERE"

# Optional (defaults shown):
slide_interval_secs = 300   # 5 minutes between slides
max_pages_per_post = 3      # cap on images shown per multi-page post
empty_day_fallback = true   # if yesterday is empty, show today-so-far
