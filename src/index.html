<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pixiv-slides</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="stage">
      <img class="layer" alt="" />
      <img class="layer" alt="" />
      <div id="status">Loading your feed…</div>
      <div id="help">← → step · space pause · r reload · esc quit</div>
      <div id="statusbar">
        <div id="sb-left">
          <span id="sb-artist"></span>
          <span id="sb-title"></span>
        </div>
        <div id="sb-right">
          <span id="sb-pos"></span>
          <span id="sb-cpu"></span>
          <span id="sb-mem"></span>
          <span id="sb-disk"></span>
          <span id="sb-net"></span>
          <span id="sb-clock"></span>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
